<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Naip Hüseyin Anadolu Lisesi - İçerik</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;700;900&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            margin: 0;
            color: #1a1a2e;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            background: linear-gradient(135deg,
                #fff0fa 0%, #e0f2fe 25%, #fef9c3 50%, #dcfce7 75%, #fce7f3 100%);
            background-size: 400% 400%;
            animation: bgShift 14s ease infinite;
            overflow-x: hidden;
        }

        @keyframes bgShift {
            0%   { background-position: 0% 50%; }
            50%  { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* FLOWERS */
        .flowers {
            position: fixed; top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none; z-index: 0; overflow: hidden;
        }
        .flower {
            position: absolute; font-size: 2.5rem;
            animation: floatFlower 6s ease-in-out infinite;
            opacity: 0.45; user-select: none;
        }
        .f1  { top:2%;  left:1%;  font-size:3rem;   animation-delay:0s;   animation-duration:7s; }
        .f2  { top:5%;  left:6%;  font-size:1.8rem; animation-delay:1s;   animation-duration:5s; }
        .f3  { top:1%;  left:11%; font-size:2.5rem; animation-delay:2s;   animation-duration:8s; }
        .f4  { top:9%;  left:3%;  font-size:1.8rem; animation-delay:0.5s; animation-duration:6s; }
        .f5  { top:2%;  right:1%; font-size:3rem;   animation-delay:1.5s; animation-duration:7s; }
        .f6  { top:6%;  right:6%; font-size:1.8rem; animation-delay:0.8s; animation-duration:5s; }
        .f7  { top:1%;  right:12%;font-size:2.5rem; animation-delay:2.5s; animation-duration:8s; }
        .f8  { top:10%; right:3%; font-size:1.8rem; animation-delay:0.3s; animation-duration:6s; }
        .f9  { bottom:2%;  left:1%;  font-size:3rem;   animation-delay:1s;   animation-duration:7s; }
        .f10 { bottom:6%;  left:6%;  font-size:1.8rem; animation-delay:2s;   animation-duration:5s; }
        .f11 { bottom:1%;  left:12%; font-size:2.5rem; animation-delay:0.5s; animation-duration:8s; }
        .f12 { bottom:2%;  right:1%; font-size:3rem;   animation-delay:0.7s; animation-duration:7s; }
        .f13 { bottom:6%;  right:6%; font-size:1.8rem; animation-delay:1.8s; animation-duration:5s; }
        .f14 { bottom:1%;  right:12%;font-size:2.5rem; animation-delay:1.2s; animation-duration:8s; }

        @keyframes floatFlower {
            0%   { transform: translateY(0px)   rotate(0deg); }
            33%  { transform: translateY(-15px) rotate(8deg); }
            66%  { transform: translateY(-7px)  rotate(-5deg); }
            100% { transform: translateY(0px)   rotate(0deg); }
        }

        /* NAV */
        nav {
            display: flex; justify-content: center;
            background: rgba(255,255,255,0.78);
            backdrop-filter: blur(12px);
            border-bottom: 3px solid rgba(168,85,247,0.25);
            padding: 14px; position: sticky; top: 0; z-index: 200;
            box-shadow: 0 4px 20px rgba(168,85,247,0.1);
        }
        nav a {
            color: #4c1d95; text-decoration: none; font-weight: 800;
            font-size: 0.9rem; text-transform: uppercase; letter-spacing: 1px;
            padding: 10px 22px; border-radius: 30px;
            border: 2px solid transparent; transition: all 0.25s; margin: 0 4px;
        }
        nav a:hover {
            background: linear-gradient(90deg, #a855f7, #6366f1);
            color: #fff; transform: translateY(-2px);
            box-shadow: 0 6px 18px rgba(168,85,247,0.35);
        }

        /* CONTENT LAYOUT */
        .content-layout {
            display: flex; flex: 1; padding: 50px 40px; gap: 50px;
            align-items: stretch; max-width: 1400px;
            margin: 0 auto; width: 100%;
            position: relative; z-index: 1;
        }

        .image-container {
            flex: 1.2;
            border-radius: 24px;
            border: 5px solid rgba(168,85,247,0.35);
            overflow: hidden;
            display: flex; align-items: center; justify-content: center;
            background: linear-gradient(135deg, #ede9fe, #dbeafe);
            min-height: 500px;
            box-shadow: 0 20px 60px rgba(168,85,247,0.25);
            transition: box-shadow 0.3s;
        }
        .image-container:hover {
            box-shadow: 0 30px 80px rgba(168,85,247,0.4);
        }
        .image-container img {
            width: 100%; height: 100%;
            object-fit: contain;
            transition: transform 0.5s ease;
        }
        .image-container:hover img { transform: scale(1.04); }

        .text-container {
            flex: 1;
            border-radius: 24px;
            padding: 44px;
            display: flex; flex-direction: column;
            background: rgba(255,255,255,0.7);
            backdrop-filter: blur(10px);
            border: 3px solid rgba(168,85,247,0.2);
            box-shadow: 0 12px 40px rgba(0,0,0,0.1);
        }

        h1 {
            font-family: 'Outfit', sans-serif;
            font-size: 2.8rem; margin: 0 0 16px 0; font-weight: 900;
            text-transform: uppercase;
            background: linear-gradient(135deg, #6366f1, #a855f7, #ec4899);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .subtitle {
            font-size: 1.1rem; margin-bottom: 28px; font-weight: 700;
            background: linear-gradient(90deg, #f97316, #fbbf24);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .text-content {
            font-size: 1.1rem; line-height: 1.75; color: #374151;
            overflow-y: auto; flex: 1;
            padding-right: 8px;
        }

        /* RESPONSIVE */
        @media (max-width: 900px) {
            .content-layout { flex-direction: column; padding: 20px; }
            .image-container { min-height: 300px; }
            h1 { font-size: 2rem; }
        }
    </style>
</head>

<body>

                <div class="flowers" aria-hidden="true">
        <span class="flower f1">🎨</span>
        <span class="flower f2">🖌️</span>
        <span class="flower f3">🖍️</span>
        <span class="flower f4">✏️</span>
        <span class="flower f5">🖌️</span>
        <span class="flower f6">🎨</span>
        <span class="flower f7">🖍️</span>
        <span class="flower f8">🖼️</span>
        <span class="flower f9">🎨</span>
        <span class="flower f10">🖌️</span>
        <span class="flower f11">🖍️</span>
        <span class="flower f12">🎨</span>
        <span class="flower f13">🖌️</span>
        <span class="flower f14">✏️</span>
        <span class="flower f15">🖍️</span>
        <span class="flower f16">🎨</span>
    </div>

        <nav>
        <a href="anasayfa.html">🏠 Anasayfa</a>
        <a href="hakkimizda.html">💡 Hakkımızda</a>
        <a href="proje-sureci.html">🎨 Proje Süreci</a>
    </nav>

    <main class="content-layout">
        <div class="image-container">
            <img id="eser-img" src="" alt="RESİM">
        </div>

        <div class="text-container">
            <h1 id="eser-title">RESİM BAŞLIĞI</h1>
            <div id="eser-subtitle" class="subtitle">Alt Başlık</div>
            <div id="eser-text" class="text-content">
                RESİM AÇIKLAMASI BURAYA GELECEK...
            </div>
        </div>
    </main>

    <script src="data.js"></script>
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const eserId = urlParams.get('eser');
        const lang = urlParams.get('lang') || 'tr';

        if (eserId && eserData[eserId]) {
            const data = eserData[eserId];
            const content = data[lang];

            document.getElementById('eser-title').innerText = content.title;
            document.getElementById('eser-subtitle').innerText = content.subtitle;
            document.getElementById('eser-text').innerHTML = content.content.replace(/\\n/g, '<br>');
            document.getElementById('eser-img').src = data.image;
            document.title = `${content.title} - Naip Hüseyin Anadolu Lisesi`;
        } else {
            document.getElementById('eser-title').innerText = "Eser Bulunamadı";
            document.getElementById('eser-text').innerText = "Lütfen QR kodu tekrar taratın.";
        }
    </script>

</body>

</html>
