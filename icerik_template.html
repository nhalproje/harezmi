<!DOCTYPE html>
<html lang="{{LANG}}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{TITLE}} - Naip Hüseyin Anadolu Lisesi</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #e84118; /* Modern Red */
            --bg: #ffffff;
            --text-main: #1a1a1a;
            --text-sub: #57606f;
            --border: #f1f2f6;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            margin: 0;
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Simplified Navigation */
        nav {
            display: flex;
            justify-content: center;
            background: #fff;
            border-bottom: 3px solid #000;
            padding: 15px;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        nav a {
            color: #000;
            text-decoration: none;
            font-weight: 800;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            padding: 10px 20px;
            margin: 0 5px;
            border: 2px solid transparent;
            transition: 0.2s;
        }

        nav a:hover {
            border-color: #000;
            background: #f1f2f6;
        }

        .main-container {
            flex: 1;
            display: flex;
            padding: 40px;
            max-width: 1400px;
            margin: 0 auto;
            width: 100%;
            box-sizing: border-box;
            gap: 60px;
        }

        .image-section {
            flex: 1;
            position: relative;
        }

        .image-box {
            width: 100%;
            height: 600px;
            border: 8px solid #000;
            background: #f9f9f9;
            overflow: hidden;
            box-shadow: 15px 15px 0px var(--primary);
        }

        .image-box img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .content-section {
            flex: 1.2;
            display: flex;
            flex-direction: column;
        }

        .tag {
            background: var(--primary);
            color: #fff;
            padding: 5px 15px;
            font-weight: 900;
            font-size: 0.8rem;
            text-transform: uppercase;
            width: fit-content;
            margin-bottom: 20px;
        }

        h1 {
            font-family: 'Outfit', sans-serif;
            font-size: 4.5rem;
            font-weight: 900;
            margin: 0;
            line-height: 1;
            text-transform: uppercase;
            color: #000;
        }

        .subtitle {
            font-size: 1.5rem;
            color: var(--primary);
            margin: 15px 0 30px 0;
            font-weight: 700;
        }

        .text-body {
            font-size: 1.2rem;
            line-height: 1.7;
            color: var(--text-main);
            text-align: justify;
            margin-bottom: 40px;
            border-left: 5px solid #000;
            padding-left: 25px;
        }

        .footer-actions {
            margin-top: auto;
            display: flex;
            gap: 20px;
        }

        .btn-action {
            display: inline-block;
            padding: 15px 35px;
            background: #000;
            color: #fff;
            text-decoration: none;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: 0.2s;
            border: none;
            cursor: pointer;
        }

        .btn-action:hover {
            background: var(--primary);
            transform: translate(-3px, -3px);
            box-shadow: 5px 5px 0px #000;
        }

        @media (max-width: 1000px) {
            .main-container { flex-direction: column; padding: 20px; }
            .image-box { height: 350px; }
            h1 { font-size: 3rem; }
        }
    </style>
</head>
<body>

        <nav>
        <a href="anasayfa.html">🏠 Anasayfa</a>
        <a href="hakkimizda.html">💡 Hakkımızda</a>
        <a href="proje-sureci.html">🎨 Proje Süreci</a>
    </nav>

    <main class="main-container">
        <section class="image-section">
            <div class="image-box">
                <img src="{{IMAGE}}" alt="{{TITLE}}">
            </div>
        </section>

        <section class="content-section">
            <div class="tag">{{TAG}}</div>
            <h1>{{TITLE}}</h1>
            <div class="subtitle">{{SUBTITLE}}</div>
            <div class="text-body">
                {{CONTENT}}
            </div>
            
            <div class="footer-actions">
                <a href="{{OTHER_LANG_URL}}" class="btn-action">{{OTHER_LANG_TEXT}}</a>
            </div>
        </section>
    </main>

</body>
</html>
