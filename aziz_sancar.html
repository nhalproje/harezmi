<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aziz Sancar - Naip Hüseyin Anadolu Lisesi</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;900&family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: linear-gradient(135deg,
                #fce7f3 0%,
                #ede9fe 30%,
                #dbeafe 60%,
                #d1fae5 100%);
            background-size: 400% 400%;
            animation: bgShift 12s ease infinite;
            overflow-x: hidden;
        }

        @keyframes bgShift {
            0%   { background-position: 0% 50%; }
            50%  { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* ===== FLOWERS ===== */
        .flowers {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }
        .flower {
            position: absolute;
            font-size: 2.5rem;
            animation: floatFlower 6s ease-in-out infinite;
            opacity: 0.5;
            user-select: none;
        }
        .f1  { top:2%;  left:1%;  font-size:3.5rem; animation-delay:0s;   animation-duration:7s; }
        .f2  { top:5%;  left:6%;  font-size:2rem;   animation-delay:1s;   animation-duration:5s; }
        .f3  { top:1%;  left:11%; font-size:2.8rem; animation-delay:2s;   animation-duration:8s; }
        .f4  { top:9%;  left:3%;  font-size:2rem;   animation-delay:0.5s; animation-duration:6s; }
        .f5  { top:2%;  right:1%; font-size:3.5rem; animation-delay:1.5s; animation-duration:7s; }
        .f6  { top:6%;  right:6%; font-size:2rem;   animation-delay:0.8s; animation-duration:5s; }
        .f7  { top:1%;  right:12%;font-size:2.8rem; animation-delay:2.5s; animation-duration:8s; }
        .f8  { top:10%; right:3%; font-size:2rem;   animation-delay:0.3s; animation-duration:6s; }
        .f9  { bottom:2%;  left:1%;  font-size:3.5rem; animation-delay:1s;   animation-duration:7s; }
        .f10 { bottom:6%;  left:6%;  font-size:2rem;   animation-delay:2s;   animation-duration:5s; }
        .f11 { bottom:1%;  left:12%; font-size:2.8rem; animation-delay:0.5s; animation-duration:8s; }
        .f12 { bottom:2%;  right:1%; font-size:3.5rem; animation-delay:0.7s; animation-duration:7s; }
        .f13 { bottom:6%;  right:6%; font-size:2rem;   animation-delay:1.8s; animation-duration:5s; }
        .f14 { bottom:1%;  right:12%;font-size:2.8rem; animation-delay:1.2s; animation-duration:8s; }

        @keyframes floatFlower {
            0%   { transform: translateY(0px)   rotate(0deg); }
            33%  { transform: translateY(-18px) rotate(8deg); }
            66%  { transform: translateY(-8px)  rotate(-5deg); }
            100% { transform: translateY(0px)   rotate(0deg); }
        }

        /* ===== TOP NAV ===== */
        .top-nav {
            position: fixed;
            top: 24px;
            left: 28px;
            z-index: 200;
        }

        .home-btn {
            padding: 10px 22px;
            background: linear-gradient(90deg, #a855f7, #6366f1);
            color: #fff;
            text-decoration: none;
            font-weight: 900;
            border: none;
            text-transform: uppercase;
            border-radius: 30px;
            font-size: 0.85rem;
            letter-spacing: 1px;
            box-shadow: 0 4px 16px rgba(168,85,247,0.35);
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .home-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 24px rgba(168,85,247,0.5);
        }

        /* ===== TITLE ===== */
        .content {
            position: relative;
            z-index: 1;
            text-align: center;
        }

        .badge {
            display: inline-block;
            background: linear-gradient(90deg, #ec4899, #f97316);
            color: #fff;
            font-weight: 900;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            padding: 6px 22px;
            border-radius: 30px;
            margin-bottom: 22px;
            box-shadow: 0 4px 16px rgba(236,72,153,0.35);
        }

        h1 {
            font-family: 'Outfit', sans-serif;
            font-size: 3rem;
            font-weight: 900;
            margin: 0 0 50px 0;
            text-transform: uppercase;
            background: linear-gradient(135deg, #6366f1, #a855f7, #ec4899);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        /* ===== LANG CARDS ===== */
        .lang-container {
            display: flex;
            gap: 36px;
            max-width: 820px;
            width: 90%;
            position: relative;
            z-index: 1;
        }

        .lang-card {
            flex: 1;
            border-radius: 28px;
            padding: 50px 40px;
            text-align: center;
            text-decoration: none;
            color: #fff;
            transition: transform 0.3s, box-shadow 0.3s;
            border: 3px solid rgba(255,255,255,0.5);
            position: relative;
            overflow: hidden;
        }

        .lang-card::before {
            content: '';
            position: absolute;
            top: -60%; right: -40%;
            width: 280px; height: 280px;
            border-radius: 50%;
            background: rgba(255,255,255,0.15);
        }

        .lang-card:hover {
            transform: translateY(-12px) scale(1.04);
            box-shadow: 0 30px 70px rgba(0,0,0,0.25);
        }

        .card-tr {
            background: linear-gradient(135deg, #ef4444, #f97316, #fbbf24);
            box-shadow: 0 12px 40px rgba(239,68,68,0.35);
        }

        .card-de {
            background: linear-gradient(135deg, #1e1b4b, #3730a3, #6366f1);
            box-shadow: 0 12px 40px rgba(99,102,241,0.35);
        }

        .flag {
            font-size: 5.5rem;
            display: block;
            margin-bottom: 20px;
            position: relative;
            z-index: 1;
            animation: floatFlower 4s ease-in-out infinite;
        }

        .lang-name {
            font-size: 1.7rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 2px;
            position: relative;
            z-index: 1;
        }

        .lang-sub {
            font-size: 0.9rem;
            opacity: 0.8;
            margin-top: 8px;
            position: relative;
            z-index: 1;
        }

        @media (max-width: 700px) {
            .lang-container { flex-direction: column; }
            h1 { font-size: 2rem; }
        }
    </style>
</head>

<body>

                <div class="flowers" aria-hidden="true">
        <span class="flower f1">🎨</span>
        <span class="flower f2">🖌️</span>
        <span class="flower f3">🖍️</span>
        <span class="flower f4">✏️</span>
        <span class="flower f5">🖌️</span>
        <span class="flower f6">🎨</span>
        <span class="flower f7">🖍️</span>
        <span class="flower f8">🖼️</span>
        <span class="flower f9">🎨</span>
        <span class="flower f10">🖌️</span>
        <span class="flower f11">🖍️</span>
        <span class="flower f12">🎨</span>
        <span class="flower f13">🖌️</span>
        <span class="flower f14">✏️</span>
        <span class="flower f15">🖍️</span>
        <span class="flower f16">🎨</span>
    </div>

    <div class="top-nav">
        <a href="anasayfa.html" class="home-btn">🏠 Anasayfa</a>
    </div>

    <div class="content">
        <div class="badge">🌍 Dil Seçimi / Language</div>
        <h1>Aziz Sancar</h1><div class="subtitle" style="font-size: 1.4rem; background: linear-gradient(90deg, #f97316, #fbbf24); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; margin: -30px 0 50px 0; font-weight: 700; text-transform: uppercase;">Lütfen Dil Seçiniz / Bitte Sprache Wählen</div>
    </div>

    <div class="lang-container">
        <a id="tr-link" href="aziz_sancar_tr.html" class="lang-card card-tr">
            <span class="flag">🇹🇷</span>
            <span class="lang-name">Türkçe</span>
            <div class="lang-sub">Türkçe oku</div>
        </a>
        <a id="de-link" href="aziz_sancar_de.html" class="lang-card card-de">
            <span class="flag">🇩🇪</span>
            <span class="lang-name">Deutsch</span>
            <div class="lang-sub">Auf Deutsch lesen</div>
        </a>
    </div>

    

</body>

</html>
